<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamet Studio - Multi-Level & Builder</title>
    <style>
        :root { 
            --bg: #09090b; --panel: #121218; --accent: #ff0055; --accent2: #00e5ff; --text: #e0e0e0;
            --c-start: #2eb82e; --c-update: #00ccff; --c-collide: #ffcc00; --c-hit: #ff3333; --c-click: #cc66ff; --c-msg: #ff9900;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Hub View (Initial Window) */
        #hub-view { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 40px; overflow-y: auto; align-items: center; background: radial-gradient(circle at center, #1a1a24 0%, #000 100%); justify-content: center; }
        .hub-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .hub-tab-btn { padding: 10px 30px; background: #222; color: #fff; font-size: 16px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; transition: 0.2s; font-weight: bold;}
        .hub-tab-btn.active { background: var(--panel); border-color: var(--accent2); color: var(--accent2); }
        
        .hub-container { background: var(--panel); border: 1px solid #333; border-radius: 12px; width: 100%; max-width: 800px; padding: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); display: none;}
        .hub-container.active { display: block; }
        
        /* MIS PROYECTOS (Lista original) */
        .project-list { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .project-card { background: #000; border: 1px solid #333; border-radius: 6px; padding: 15px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; border-left: 4px solid var(--accent2); }
        .project-card:hover { border-color: var(--accent2); transform: translateX(5px); }
        .project-info h4 { margin: 0 0 5px 0; color: #fff; font-size: 18px;}
        .project-info p { margin: 0; font-size: 13px; color: #888; }
        .project-actions { display: flex; gap: 8px; }
        .project-actions button { width: auto; margin: 0; padding: 8px 15px; font-size: 13px; border-radius: 4px; }

        /* COMUNIDAD (Grid estilo Roblox/Scratch) */
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; width: 100%; margin-top: 15px; max-height: 450px; overflow-y: auto; padding-right: 10px;}
        .hub-card { background: #000; border: 1px solid #333; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; transition: 0.2s; }
        .hub-card:hover { transform: translateY(-5px); border-color: var(--accent2); box-shadow: 0 10px 25px rgba(0,229,255,0.15); }
        .hub-card .thumb { height: 120px; background: #111; display: flex; justify-content: center; align-items: center; font-size: 40px; border-bottom: 2px solid #333; }
        .hub-card .info { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .hub-card .info h4 { margin: 0 0 5px 0; font-size: 15px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hub-card .info p.author { margin: 0 0 10px 0; font-size: 12px; color: var(--accent2); }
        .hub-card .info .badge { align-self: flex-start; padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; margin-bottom: 15px; }
        .badge.template { background: rgba(0, 229, 255, 0.2); color: var(--accent2); }
        .badge.game { background: rgba(0, 204, 102, 0.2); color: #00cc66; }
        .hub-card button { margin-top: auto; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 13px; border: none; }

        /* PLAY MODAL (Para ejecutar juegos de la comunidad) */
        #play-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .play-header { width: 800px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .play-header h2 { margin: 0; color: #fff; font-size: 20px; }
        .play-header button { background: #ff3333; color: white; padding: 8px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .play-header button:hover { background: #ff0055; transform: scale(1.05); }
        #play-iframe { width: 800px; height: 480px; border: 2px solid #444; border-radius: 8px; background: #000; box-shadow: 0 20px 60px rgba(0,0,0,0.7); }

        /* Workspace View */
        #workspace-view { display: none; flex-direction: column; height: 100vh; }

        /* Tabs Nav */
        header { display: flex; background: #050505; border-bottom: 2px solid var(--accent); overflow-x: auto; align-items: center; }
        .header-logo-container { display: flex; align-items: center; padding: 0 15px; gap: 10px; border-right: 1px solid #222; }
        .header-logo { max-height: 30px; border-radius: 4px; }
        .header-logo-text { font-weight: bold; color: var(--accent2); font-size: 16px; letter-spacing: 1px; }

        .tab { padding: 12px 15px; cursor: pointer; font-weight: bold; color: #666; transition: 0.2s; border-right: 1px solid #222; font-size: 13px; text-transform: uppercase; white-space: nowrap;}
        .tab:hover { color: var(--accent2); background: #111; }
        .tab.active { background: var(--panel); color: #fff; border-top: 3px solid var(--accent2); }
        
        /* Layout */
        .view { display: none; flex: 1; height: calc(100vh - 45px); }
        .view.active { display: flex; }
        .sidebar { width: 350px; background: var(--panel); padding: 15px; border-right: 1px solid #222; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .main-area { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; overflow-y: auto; padding: 20px; align-items: center; }
        
        h2, h3 { margin: 0 0 5px 0; border-bottom: 1px solid #333; padding-bottom: 5px; color: var(--accent2); font-size: 15px; text-transform: uppercase; letter-spacing: 1px;}
        input[type="text"], input[type="number"], input[type="color"], select, button { width: 100%; padding: 8px; margin-bottom: 5px; background: #000; color: #fff; border: 1px solid #444; border-radius: 4px; font-size: 13px; outline: none; }
        input:focus, select:focus { border-color: var(--accent2); }
        input[type="color"] { height: 40px; cursor: pointer; padding: 2px; }
        button { background: #222; cursor: pointer; font-weight: bold; transition: 0.2s; border: 1px solid #555;}
        button:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-green { background: #009944; border-color: #009944; } .btn-green:hover { background: #00cc55; }
        
        /* Editor de Mundo */
        .grid-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        #grid { display: grid; background: #111; border: 2px solid #333; width: 800px; height: 480px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); cursor: crosshair; }
        .cell { background: #000; display: flex; justify-content: center; align-items: center; image-rendering: pixelated; background-size: cover; background-position: center; font-family: monospace; font-size: 16px; border: 1px solid #2d2d30; touch-action: none; }
        .cell:hover { border: 1px solid var(--accent2); z-index: 10; background-color: rgba(0, 229, 255, 0.2); }
        .palette-item { padding: 8px; border: 1px solid #333; margin-bottom: 5px; cursor: pointer; display: flex; align-items: center; gap: 10px; background: #0a0a0a; border-radius: 4px; }
        .palette-item.selected { border-color: var(--accent2); background: #112; }
        .palette-icon { width: 32px; height: 32px; display: inline-block; image-rendering: pixelated; background-size: cover; border: 1px solid #444; background-color: #000;}

        /* Editor de Sprites */
        #sprite-editor { display: grid; grid-template-columns: repeat(16, 1fr); width: 224px; height: 224px; margin: 5px auto; background: #000; border: 2px solid #444; gap: 0; }
        .pixel { background: transparent; cursor: crosshair; border: 1px solid rgba(255,255,255,0.04); touch-action: none; }
        .pixel:hover { outline: 1px solid rgba(255,255,255,0.5); z-index: 10; }
        .sprite-gallery { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; padding: 5px; background: #0a0a0a; border: 1px solid #333; border-radius: 4px; min-height: 52px;}
        .sprite-thumb { width: 40px; height: 40px; border: 2px solid #444; image-rendering: pixelated; cursor: pointer; background: #000;}
        .sprite-thumb.selected { border-color: var(--accent2); box-shadow: 0 0 10px var(--accent2); }

        /* UIs */
        #ui-preview-container { width: 800px; height: 480px; background: #111; border: 2px dashed #555; position: relative; overflow: hidden; margin-top: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .preview-text { position: absolute; color: white; font-weight: bold; text-shadow: 2px 2px 0 #000; transform: translate(-50%, -50%); }
        .preview-sprite { position: absolute; image-rendering: pixelated; transform: translate(-50%, -50%); }

        /* Bloques Lógicos */
        .block-palette-area { background: #0a0a0a; padding: 10px; border-radius: 6px; flex: 1; overflow-y: auto; border: 1px solid #222; }
        .visual-block { padding: 6px 10px; margin-bottom: 6px; border-radius: 4px; font-size: 11px; font-weight: bold; color: #fff; cursor: grab; display: flex; align-items: center; justify-content: space-between; gap: 8px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 2px 5px rgba(0,0,0,0.3);}
        .visual-block span { flex: 1; }
        .visual-block input { width: 65px; margin: 0; padding: 2px; background: rgba(0,0,0,0.6); border: 1px solid #888; border-radius: 4px; text-align: center; color: #fff; height: 22px; font-family: monospace;}
        
        .b-move { background-color: #3366ff; } .b-combat { background-color: #ff3333; } .b-player { background-color: #00cc66; color: #000; } .b-look { background-color: #9933ff; } .b-system { background-color: #ff9900; color: #000;} .b-var { background-color: #ff66aa; }

        /* Dropzones */
        .event-container { background: #16161e; border: 2px solid #333; border-radius: 8px; margin-bottom: 15px; padding: 10px; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); width: 100%;}
        .event-hat { color: #000; padding: 8px 12px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;}
        .dropzone { 
            min-height: 80px; padding: 10px; border-radius: 6px; border: 2px dashed rgba(0, 229, 255, 0.4); 
            background-color: #1a1a24; 
            background-image: 
                linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 20px 20px;
            transition: 0.2s; 
        }
        .dropzone.drag-over { border-color: var(--accent2); background-color: rgba(0, 229, 255, 0.15); }
        .workspace-block { position: relative; margin-bottom: 5px; border-left: 5px solid rgba(255,255,255,0.5); }
        .btn-block-action { background: #333; color: #fff; border: 1px solid #555; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; padding: 0; display:flex; align-items:center; justify-content:center; transition: 0.1s;}
        .btn-block-action:hover { background: #555; }
        .btn-block-action.del:hover { background: #ff0055; border-color:#ff0055; }

        /* Play Mode */
        #gameContainer { position: relative; width: 800px; height: 480px; box-shadow: 0 0 30px rgba(0, 229, 255, 0.1); overflow: hidden; border: 2px solid #333; }
        #gameCanvas { width: 100%; height: 100%; image-rendering: pixelated; background: #000; }
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        #log { width: 800px; background: #050505; color: #0f0; font-family: monospace; height: 120px; overflow-y: auto; padding: 10px; margin-top: 10px; border: 1px solid #333; font-size: 13px; }
    </style>
</head>
<body>

    <!-- MODAL PARA JUGAR JUEGOS DE LA COMUNIDAD (TIPO ROBLOX) -->
    <div id="play-modal">
        <div class="play-header">
            <h2 id="play-modal-title">Jugando...</h2>
            <button onclick="closePlayModal()">CERRAR JUEGO</button>
        </div>
        <iframe id="play-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>

    <!-- 0. PANTALLA INICIAL (HUB) -->
    <div id="hub-view">
        <div id="logo-container" style="position: relative; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; min-height: 120px; width: 100%;">
            <img id="hub-logo" src="https://lh3.googleusercontent.com/d/1Va-iD8gd8lqG0TFS0kWB-SbOXTAUVIhT" alt="Gamet Logo" style="max-height: 120px; border-radius: 8px; filter: drop-shadow(0 0 12px rgba(0,229,255,0.4));" onerror="showLogoFallback()">
            
            <div id="hub-logo-fallback" style="display:none; text-align: center;">
                <svg width="100" height="100" viewBox="0 0 100 100" style="filter: drop-shadow(0 0 8px #00e5ff);">
                    <polygon points="50,5 95,25 95,75 50,95 5,75 5,25" fill="none" stroke="#00e5ff" stroke-width="4"/>
                    <path d="M30,35 L50,15 L70,35 L70,65 L50,85 L30,65 Z" fill="none" stroke="#ff0055" stroke-width="4"/>
                    <text x="50" y="58" font-family="'Segoe UI', sans-serif" font-weight="bold" font-size="22" fill="#fff" text-anchor="middle">G</text>
                </svg>
            </div>
        </div>
        <p style="text-align: center; color: #888; margin-top: 0; font-size: 14px; margin-bottom: 30px;">Tu creador local de juegos</p>

        <div class="hub-tabs">
            <button class="hub-tab-btn active" id="btn-tab-local" onclick="showHubTab('local')">Mis Proyectos</button>
            <button class="hub-tab-btn" id="btn-tab-com" onclick="showHubTab('community')">🌐 Descubrir (Comunidad)</button>
        </div>

        <div class="hub-container active" id="hub-local">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="new-project-name" placeholder="Nombre de tu nuevo juego..." style="flex: 1; margin: 0; padding: 12px; font-size: 16px;">
                <button onclick="hubCreateProject()" style="width: auto; margin: 0; padding: 0 25px; background: var(--accent); color: #fff; font-size: 14px;">➕ Crear Juego</button>
            </div>

            <div class="project-list" id="hub-project-list"></div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <label style="flex: 1; background: #1a1a24; border: 1px dashed #444; border-radius: 6px; padding: 12px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; color: var(--accent2);">
                    📂 Importar Proyecto (.json)
                    <input type="file" id="hub-import-file" style="display: none;" accept=".json" onchange="hubImportProject(event)">
                </label>
            </div>
            
            <button onclick="factoryReset()" style="background:transparent; color:#ff3333; border:1px solid #ff3333; font-size:12px; margin-top:20px; width:100%;">⚠️ Restaurar Motor de Fábrica (Borrar Todo si hay Errores)</button>
        </div>

        <div class="hub-container" id="hub-community" style="max-width: 900px; width:100%; padding:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:10px;">
                <h3 style="color:#00e5ff; margin:0;">🕹️ Juegos de la Comunidad</h3>
                <p style="color:#aaa; font-size:13px; margin:0;">Juega al instante o remezcla plantillas.</p>
            </div>
            <div class="hub-grid" id="hub-community-list"></div>
        </div>
    </div>

    <!-- PESTAÑA PRINCIPAL DEL WORKSPACE -->
    <div id="workspace-view">
        <header id="main-header">
            <div class="header-logo-container">
                <img id="workspace-header-logo" src="https://lh3.googleusercontent.com/d/1Va-iD8gd8lqG0TFS0kWB-SbOXTAUVIhT" alt="Gamet Logo Small" class="header-logo" onerror="this.style.display='none';">
                <span class="header-logo-text">GAMET</span>
            </div>
            <div class="tab" onclick="hubGoBack()" style="color: #ffcc00;">🏠 Proyectos</div>
            <div class="tab active" onclick="switchTab('tab-world')">🌍 Mundo</div>
            <div class="tab" onclick="switchTab('tab-sprites')">🎨 Sprites</div>
            <div class="tab" onclick="switchTab('tab-ui')">🖥️ UIs</div>
            <div class="tab" onclick="switchTab('tab-chars')">🧩 Código</div>
            <div class="tab" onclick="switchTab('tab-settings')">⚙️ Ajustes</div>
            <div class="tab" onclick="switchTab('tab-save')" style="color: var(--accent2); margin-left: auto;">📦 Publicar</div>
            <div class="tab" onclick="switchTab('tab-play')" style="color: #00ff66; border-left: 1px solid #222;">▶️ JUGAR</div>
        </header>

        <!-- 1. MUNDO -->
        <div id="tab-world" class="view active">
            <div class="sidebar">
                <h3>Gestión de Niveles</h3>
                <select id="level-select" onchange="selectLevel(this.value)"></select>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <input type="text" id="new-level-name" placeholder="Nombre Nivel..." style="flex:1; margin:0;">
                    <button onclick="createNewLevel()" style="width:auto; margin:0; background:var(--accent2); color:#000;">➕</button>
                </div>
                <button onclick="deleteActiveLevel()" style="background:#ff3333; margin-top:5px; font-size:12px; color:#fff;">🗑️ Borrar Nivel Activo</button>
                <hr style="border-color:#333; margin:15px 0;">
                
                <h3>Paleta del Mapa</h3>
                <div id="palette-container"></div>
                <button onclick="clearMap()" style="background:#ff0055; margin-top:20px;">🗑️ Borrar Mapa Entero</button>
            </div>
            <div class="main-area grid-wrapper">
                <div id="grid"></div>
            </div>
        </div>

        <!-- 2. SPRITES -->
        <div id="tab-sprites" class="view">
            <div class="sidebar">
                <h3>Pintor 16x16</h3>
                <input type="color" id="paint-color" value="#ffffff">
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <button onclick="clearSpriteEditor()">Limpiar</button>
                    <button onclick="saveSprite()" style="background:var(--accent2); color:#000;">💾 Guardar Sprite</button>
                </div>
                <hr style="border-color:#333; margin:15px 0;">
                <h3>Pincel y Cebolla</h3>
                <label style="font-size:12px;">Tamaño del Pincel:</label>
                <select id="brush-size">
                    <option value="1">1x1 píxel</option>
                    <option value="2">2x2 píxeles</option>
                    <option value="3">3x3 píxeles (Centro)</option>
                </select>
                <label style="display:flex; align-items:center;
